<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Move work forward — Hero mock</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-1: #0066ff;
    --blue-2: #0a7aff;
    --nav-height: 72px;
    --max-width: 1180px;
    --btn-yellow: #ffb000;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    color:#fff;
    background:linear-gradient(180deg,#f6f8fb 0%, #f6f8fb 100%);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* Top navigation */
  .site-header{
    height:var(--nav-height);
    display:flex;
    align-items:center;
    background:transparent;
    padding:0 24px;
  }
  .nav-inner{
    width:100%;
    max-width:var(--max-width);
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:700;
    color: #0b5cff;
  }
  .brand .logo{
    width:28px;
    height:28px;
    background:linear-gradient(135deg,#0b5cff,#3bb0ff);
    border-radius:4px;
    display:inline-block;
  }
  .nav-links{
    display:flex;
    gap:20px;
    align-items:center;
    color:#333;
  }
  .nav-links a{
    color:#4b5563;
    text-decoration:none;
    font-weight:500;
    font-size:14px;
  }
  .nav-cta{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .btn-outline{
    border:1px solid #e5e7eb;
    padding:8px 12px;
    border-radius:6px;
    background:#fff;
    color:#111827;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
  }
  .btn-primary{
    padding:8px 14px;
    border-radius:8px;
    background:var(--btn-yellow);
    color:#111;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
  }

  /* Hero */
  .hero{
    background: linear-gradient(90deg,#0e66d6 0%, #0a8cff 100%);
    padding:48px 24px;
    border-radius:0 0 28px 28px;
    margin-top: -8px; /* pull hero up under nav*/
  }
  .hero-inner{
    max-width:var(--max-width);
    margin:0 auto;
    display:grid;
    grid-template-columns: 1fr 560px;
    gap:36px;
    align-items:center;
    min-height:420px;
  }

  .hero-left{
    padding: 24px 8px;
  }
  .eyebrow{
    font-size:14px;
    color:rgba(255,255,255,0.92);
    opacity:0.95;
    margin-bottom:14px;
    display:inline-block;
    font-weight:600;
  }
  h1{
    margin:0 0 18px 0;
    font-size:56px;
    line-height:1.02;
    letter-spacing:-0.02em;
    font-weight:800;
    color:#fff;
    text-shadow:0 3px 18px rgba(0,0,0,0.08);
  }
  .lead{
    margin:0 0 22px 0;
    color: rgba(255,255,255,0.94);
    font-size:18px;
    max-width:520px;
    font-weight:500;
  }
  .hero-left .cta{
    display:inline-block;
    text-decoration:none;
    padding:12px 18px;
    border-radius:8px;
    background: #ffc04a;
    color:#081018;
    font-weight:700;
    box-shadow: 0 8px 24px rgba(18,27,61,0.12);
  }

  /* Hero illustration column */
  .hero-right{
    position:relative;
    min-height:300px;
  }
  .illustration{
    position:relative;
    width:100%;
    height:100%;
    border-radius:12px;
    overflow:visible;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .illustration .img-wrap{
    width:100%;
    height:100%;
    display:block;
    background-size:contain;
    background-position:center bottom;
    background-repeat:no-repeat;
    transform:translateY(6px) scale(1.02);
    filter: drop-shadow(0 30px 40px rgba(2,18,54,0.18));
  }

  /* Decorative shapes to mimic screenshot */
  .shape-top{
    position:absolute;
    right:36px;
    top:20px;
    width:86px;
    height:86px;
    background:rgba(255,255,255,0.06);
    border-radius:10px;
    transform:rotate(6deg);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .shape-small{
    position:absolute;
    right:110px;
    bottom:36px;
    width:64px;
    height:64px;
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    border-radius:8px;
    transform:rotate(-8deg);
  }

  /* Responsive
  @media (max-width:1000px){
    .hero-inner{ grid-template-columns:1fr 1fr; gap:24px; }
    h1{ font-size:48px; }
  }
  @media (max-width:820px){
    .nav-links{ display:none; }
    .hero-inner{ grid-template-columns:1fr; text-align:center; padding-bottom:14px; }
    .hero-left{ order:2; padding-top:10px; }
    .hero-right{ order:1; height:320px; }
    h1{ font-size:36px; }
    .lead{ margin-left:auto; margin-right:auto; }
    .brand{ gap:8px; }
    .shape-top, .shape-small{ display:none; }
  } */

</style>
</head>
<body>

<header class="site-header" role="banner">
  <div class="nav-inner">
    <a class="brand" href="#">
      <span class="logo" aria-hidden="true"></span>
      <span>ATLASSIAN</span>
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="#">Products</a>
      <a href="#">For teams</a>
      <a href="#">Support</a>
    </nav>

    <div class="nav-cta">
      <a class="btn-outline" href="#">Try free</a>
      <a class="btn-primary" href="#">Buy now</a>
    </div>
  </div>
</header>

<section class="hero" role="region" aria-label="Hero">
  <div class="hero-inner">
    <div class="hero-left">
      <div class="eyebrow">Move work</div>
      <h1>Move work<br/>forward</h1>
      <p class="lead">Atlassian helps teams work smarter and faster, together.</p>
      <a class="cta" href="#">Learn more</a>
    </div>

    <div class="hero-right" aria-hidden="true">
      <div class="illustration">
        <!-- Replace the URL below with your actual image. In your container it's /mnt/data/Image11-1.webp -->
        <div class="img-wrap" style="background-image: url('laptop.png');"></div>
      </div>

      <div class="shape-top" aria-hidden="true"></div>
      <div class="shape-small" aria-hidden="true"></div>
    </div>
  </div>
</section>

</body>
</html>
