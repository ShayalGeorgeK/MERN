<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Heaven</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="logo.png" alt="Coffee Logo" />
        <h2>Coffee Heaven</h2>
      </div>

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Pages</a></li>
          <li><a href="#">Shortcodes</a></li>
          <li><a href="#">Shop</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="social">
        <a href="#">📘</a>
        <a href="#">📸</a>
        <a href="#">🐦</a>
        <a href="#">💼</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Section -->
      <section class="hero">
        <div class="overlay">
          <div class="hero-text">
            <h1>Coffee Heaven</h1>
            <p>
              Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
            </p>
            <button>SHOP HERE</button>
          </div>
        </div>
      </section>

      <!-- Products Section -->
      <section class="products">
        <h2>Our Hot Products</h2>
        <div class="product-grid">
          <div class="product">
            <img src="co3.jpeg" alt="Black Coffee" />
            <h3>Black Coffee</h3>
          </div>
          <div class="product">
            <img src="co4.jpeg" alt="Hot Coffee" />
            <h3>Hot Coffee</h3>
          </div>
          <div class="product">
            <img src="co5.jpeg" alt="Dark Coffee" />
            <h3>Dark Coffee</h3>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
